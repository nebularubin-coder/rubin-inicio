<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rubin Editorial — Panel de equipo</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0ede8;
    --muted: #888580;
    --accent: #e8c97a;
    --luna: #c45c3a;
    --nebula: #7b6fd4;
    --meteorito: #4a9e6b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 1000; opacity: 0.4;
  }
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.25rem 2.5rem;
    border-bottom: 1px solid var(--border);
    background: rgba(14,14,14,0.92);
    backdrop-filter: blur(12px);
    position: sticky; top: 0; z-index: 100;
  }
  .logo { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); }
  .date-pill { font-size: 0.75rem; color: var(--muted); margin-left: 1rem; }
  .status { display: flex; align-items: center; gap: 0.5rem; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); transition: background 0.3s; }
  .status-dot.live { background: #4a9e6b; box-shadow: 0 0 6px rgba(74,158,107,0.5); }
  .status-dot.error { background: var(--luna); }
  .status-label { font-size: 0.72rem; color: var(--muted); }

  /* LAYOUT */
  .main {
    display: grid;
    grid-template-columns: 1fr 1fr 320px;
    gap: 1.5rem;
    padding: 2rem 2.5rem;
    align-items: start;
  }

  /* COLUMNA IZQUIERDA: noticias apiladas */
  .col-news { display: flex; flex-direction: column; gap: 1.5rem; }

  /* CARDS */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    animation: fadeIn 0.4s ease both;
  }
  .card:nth-child(2) { animation-delay: 0.07s; }
  .card:nth-child(3) { animation-delay: 0.14s; }
  .card-header {
    padding: 0.85rem 1.25rem;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .card-title { font-family: 'Syne', sans-serif; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); }
  .card-body { padding: 1.25rem; }
  .important-card { border-color: rgba(196,92,58,0.4); }
  .important-card .card-header { border-color: rgba(196,92,58,0.25); }
  .important-title { color: #c45c3a !important; }

  /* TEXTO NOTICIAS */
  .news-text { font-size: 0.84rem; line-height: 1.85; color: #c8c5bf; white-space: pre-wrap; }

  /* ANTOLOGÍAS */
  .sello-block { margin-bottom: 2rem; }
  .sello-header { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.85rem; padding-bottom: 0.6rem; border-bottom: 1px solid var(--border); }
  .sello-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .sello-name { font-family: 'Syne', sans-serif; font-size: 0.78rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }
  .s-nebula .sello-dot { background: var(--nebula); } .s-nebula .sello-name { color: var(--nebula); }
  .s-luna .sello-dot { background: var(--luna); } .s-luna .sello-name { color: var(--luna); }
  .s-meteorito .sello-dot { background: var(--meteorito); } .s-meteorito .sello-name { color: var(--meteorito); }

  .antologia { margin-bottom: 0.6rem; border: 1px solid var(--border); border-radius: 9px; overflow: hidden; transition: border-color 0.2s; }
  .antologia:hover { border-color: var(--border2); }
  .ant-header { display: flex; align-items: center; justify-content: space-between; padding: 0.6rem 0.9rem; cursor: pointer; background: var(--surface); user-select: none; }
  .ant-title { font-size: 0.85rem; font-weight: 500; }
  .chevron { font-size: 0.65rem; color: var(--muted); transition: transform 0.2s; }
  .open .chevron { transform: rotate(180deg); }
  .task-list { display: none; padding: 0.4rem 0; background: var(--surface2); }
  .open .task-list { display: block; }
  .task-item { display: flex; align-items: flex-start; gap: 0.5rem; padding: 0.35rem 0.9rem; font-size: 0.8rem; line-height: 1.5; color: #c0bdb8; }
  .task-bullet { color: var(--muted); flex-shrink: 0; }

  /* LINKS */
  .links-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
  .quick-link {
    display: flex; align-items: center; gap: 0.5rem;
    padding: 0.6rem 0.75rem; border-radius: 8px;
    border: 1px solid var(--border); background: var(--surface2);
    text-decoration: none; color: var(--text); font-size: 0.8rem;
    transition: all 0.15s;
  }
  .quick-link:hover { border-color: var(--accent); color: var(--accent); background: rgba(232,201,122,0.06); }

  /* SKELETON */
  .skel { height: 13px; background: var(--surface2); border-radius: 4px; margin-bottom: 0.55rem; animation: pulse 1.5s ease infinite; }
  .skel.short { width: 55%; } .skel.med { width: 75%; }
  @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:0.9} }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  ::-webkit-scrollbar{width:4px} ::-webkit-scrollbar-track{background:transparent} ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>
<body>

<header class="header">
  <div style="display:flex;align-items:baseline;">
    <span class="logo">Rubin Editorial</span>
    <span class="date-pill" id="currentDate"></span>
  </div>
  <div class="status">
    <span class="status-dot" id="statusDot"></span>
    <span class="status-label" id="statusLabel">Conectando con Notion...</span>
  </div>
</header>

<div class="main">

  <!-- COLUMNA 1: NOTICIAS -->
  <div class="col-news">
    <div class="card">
      <div class="card-header"><span class="card-title">📡 Noticias del equipo</span></div>
      <div class="card-body" id="body-news">
        <div class="skel"></div><div class="skel med"></div><div class="skel"></div><div class="skel short"></div>
      </div>
    </div>
    <div class="card important-card">
      <div class="card-header"><span class="card-title important-title">🔔 Noticia importante</span></div>
      <div class="card-body" id="body-important">
        <div class="skel"></div><div class="skel med"></div><div class="skel"></div><div class="skel short"></div><div class="skel med"></div>
      </div>
    </div>
  </div>

  <!-- COLUMNA 2: ANTOLOGÍAS -->
  <div class="card" style="padding:1.25rem;">
    <div style="font-family:'Syne',sans-serif;font-size:0.7rem;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-bottom:1.25rem;">📋 Estado de antologías</div>
    <div id="body-antologias">
      <div class="skel"></div><div class="skel med"></div><div class="skel"></div>
      <div class="skel short"></div><div class="skel"></div><div class="skel med"></div>
    </div>
  </div>

  <!-- COLUMNA 3: ACCESOS RÁPIDOS -->
  <div class="card">
    <div class="card-header"><span class="card-title">🔗 Accesos rápidos</span></div>
    <div class="card-body">
      <div class="links-grid">
        <a class="quick-link" href="https://app.clickup.com" target="_blank">📋 ClickUp</a>
        <a class="quick-link" href="https://www.notion.so/373cb3a15b6b81a098cada7f12ff5b79" target="_blank">📡 Noticias</a>
        <a class="quick-link" href="https://drive.google.com" target="_blank">📁 Google Drive</a>
        <a class="quick-link" href="https://app.brevo.com" target="_blank">📧 Brevo</a>
        <a class="quick-link" href="https://chatgpt.com" target="_blank">🤖 ChatGPT</a>
        <a class="quick-link" href="https://rubineditorial.com" target="_blank">🌐 Web</a>
        <a class="quick-link" href="https://www.notion.so/364cb3a15b6b817c8c0be14e2d824d20" target="_blank">📚 Wiki</a>
        <a class="quick-link" href="https://docs.google.com/spreadsheets/d/1YAc5Xm5vmWjQXiAejbtWnDNOiFX6yyfz2iVxo626BhM" target="_blank">📊 Planilla base</a>
      </div>
    </div>
  </div>

</div>

<script>
const WORKER_URL = 'https://rubin-notion.nebularubin.workers.dev/';

// Fecha
const now = new Date();
document.getElementById('currentDate').textContent = now.toLocaleDateString('es-AR', {weekday:'long', year:'numeric', month:'long', day:'numeric'});

function setStatus(type, msg) {
  document.getElementById('statusDot').className = 'status-dot ' + type;
  document.getElementById('statusLabel').textContent = msg;
}

function getRichText(block) {
  const type = block.type;
  if (!block[type]) return '';
  return (block[type].rich_text || []).map(r => r.plain_text).join('');
}

function renderNews(blocks) {
  // Detectar índices de cada sección H2
  let sections = {};
  blocks.forEach((b, i) => {
    if (b.type === 'heading_2') {
      const t = getRichText(b);
      if (t.includes('Noticias del equipo')) sections.news = i;
      else if (t.includes('Noticia importante')) sections.important = i;
      else if (t.includes('Estado de antolog')) sections.antologias = i;
    }
  });

  // Extraer texto de cada sección hasta la siguiente H2 o divider
  function extractSection(startIdx) {
    if (startIdx === undefined) return null;
    let lines = [];
    for (let i = startIdx + 1; i < blocks.length; i++) {
      const b = blocks[i];
      if (b.type === 'heading_2' || b.type === 'divider') break;
      const text = getRichText(b);
      if (!text) continue;
      if (b.type === 'bulleted_list_item') lines.push('• ' + text);
      else lines.push(text);
    }
    return lines.join('\n');
  }

  // NOTICIAS
  const newsText = extractSection(sections.news);
  document.getElementById('body-news').innerHTML = newsText
    ? `<div class="news-text">${newsText}</div>`
    : `<div class="news-text" style="color:var(--muted);font-style:italic;">Sin noticias.</div>`;

  // NOTICIA IMPORTANTE
  const importantText = extractSection(sections.important);
  document.getElementById('body-important').innerHTML = importantText
    ? `<div class="news-text">${importantText}</div>`
    : `<div class="news-text" style="color:var(--muted);font-style:italic;">Sin novedades.</div>`;

  // ANTOLOGÍAS — parsear H3 como sellos, negrita como antologías, bullets como tareas
  if (sections.antologias === undefined) {
    document.getElementById('body-antologias').innerHTML = `<div style="color:var(--muted);font-size:0.82rem;font-style:italic;">No se encontró la sección Estado de antologías en Notion.</div>`;
    return;
  }

  let html = '';
  let currentSello = null;
  let currentAnt = null;
  let antId = 0;
  let tasks = [];

  function closeTasks() {
    if (tasks.length && currentAnt !== null) {
      html += `<div class="task-list">`;
      tasks.forEach(t => {
        html += `<div class="task-item"><span class="task-bullet">·</span><span>${t}</span></div>`;
      });
      html += `</div></div>`;
      tasks = [];
    } else if (currentAnt !== null) {
      html += `</div>`;
    }
    currentAnt = null;
  }

  const SELLOS = {
    'Nébula': 's-nebula',
    'Luna Roja': 's-luna',
    'Meteorito': 's-meteorito'
  };

  for (let i = sections.antologias + 1; i < blocks.length; i++) {
    const b = blocks[i];
    if (b.type === 'heading_2') break;

    const text = getRichText(b);
    if (!text) continue;

    if (b.type === 'heading_3') {
      // Cerrar antología anterior
      closeTasks();
      // Cerrar sello anterior
      if (currentSello) html += `</div>`;

      const clazz = SELLOS[text] || 's-nebula';
      html += `<div class="sello-block ${clazz}">`;
      html += `<div class="sello-header"><div class="sello-dot"></div><span class="sello-name">${text}</span></div>`;
      currentSello = text;
      currentAnt = null;

    } else if (b.type === 'paragraph') {
      // Detectar si es negrita (título de antología) o texto normal
      const type = b.type;
      const richText = b[type]?.rich_text || [];
      const isBold = richText.length > 0 && richText[0].annotations?.bold;

      if (isBold) {
        closeTasks();
        antId++;
        html += `<div class="antologia" id="ant-${antId}">`;
        html += `<div class="ant-header" onclick="toggleAnt('ant-${antId}')">`;
        html += `<span class="ant-title">${text}</span>`;
        html += `<span class="chevron">▼</span></div>`;
        currentAnt = antId;
      } else {
        if (currentAnt !== null) tasks.push(text);
      }

    } else if (b.type === 'bulleted_list_item') {
      if (currentAnt !== null) tasks.push('• ' + text);
    }
  }

  closeTasks();
  if (currentSello) html += `</div>`;

  document.getElementById('body-antologias').innerHTML = html || `<div style="color:var(--muted);font-size:0.82rem;">Sin datos.</div>`;
}

function toggleAnt(id) {
  document.getElementById(id).classList.toggle('open');
}

async function fetchNotion() {
  try {
    const resp = await fetch(WORKER_URL);
    if (!resp.ok) throw new Error('Error ' + resp.status);
    const data = await resp.json();
    renderNews(data.results);
    setStatus('live', 'Sincronizado · ' + now.toLocaleTimeString('es-AR', {hour:'2-digit', minute:'2-digit'}));
  } catch(e) {
    setStatus('error', 'Sin conexión a Notion');
    ['body-news','body-important','body-antologias'].forEach(id => {
      document.getElementById(id).innerHTML = `<div style="color:var(--muted);font-size:0.82rem;font-style:italic;">No se pudo conectar con Notion.</div>`;
    });
    console.error(e);
  }
}

fetchNotion();
</script>
</body>
</html>
