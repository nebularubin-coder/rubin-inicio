<style>
  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0ede8;
    --muted: #888580;
    --accent: #e8c97a;
    --accent2: #c45c3a;

    --luna: #c45c3a;

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  body::before {
    content: '';

    inset: 0;

    pointer-events: none;
    z-index: 1000;
    opacity: 0.4;
  }
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.25rem 2.5rem;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0;
    background: rgba(14,14,14,0.92);
    backdrop-filter: blur(12px);
    z-index: 100;
  }
  .header-left { display: flex; align-items: baseline; gap: 1rem; }
  .logo { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); }
  .date-pill { font-size: 0.75rem; color: var(--muted); }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); display: inline-block; margin-right: 6px; transition: background 0.3s; }
  .status-dot.live { background: #4a9e6b; box-shadow: 0 0 6px rgba(74,158,107,0.5); }
  .status-dot.error { background: var(--accent2); }
  .status-label { font-size: 0.72rem; color: var(--muted); }

  .main { display: grid; grid-template-columns: 1fr 360px; gap: 0; min-height: calc(100vh - 60px); }

  /* LEFT */
  .left { padding: 2rem 2.5rem; border-right: 1px solid var(--border); }
  .section-title { font-family: 'Syne', sans-serif; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 1.5rem; }

  /* LOADING */
  .loading-state { display: flex; flex-direction: column; gap: 0.75rem; }
  .skeleton { height: 48px; background: var(--surface); border-radius: 8px; animation: pulse 1.5s ease infinite; }
  .skeleton.tall { height: 120px; }
  @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 0.8; } }

  /* SELLO */
  .sello-block { margin-bottom: 2.5rem; animation: fadeIn 0.4s ease both; }
  .sello-block:nth-child(2) { animation-delay: 0.05s; }
  .sello-block:nth-child(3) { animation-delay: 0.1s; }
  .sello-block:nth-child(4) { animation-delay: 0.15s; }
  .sello-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--border); }
  .sello-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .sello-name { font-family: 'Syne', sans-serif; font-size: 0.85rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }
  .sello-nebula .sello-dot { background: var(--nebula); }
  .sello-nebula .sello-name { color: var(--nebula); }
  .sello-luna .sello-dot { background: var(--luna); }
  .sello-luna .sello-name { color: var(--luna); }
  .sello-meteorito .sello-dot { background: var(--meteorito); }
  .sello-meteorito .sello-name { color: var(--meteorito); }

  /* ANTOLOGÍA */
  .antologia { margin-bottom: 0.75rem; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; transition: border-color 0.2s; }
  .antologia:hover { border-color: var(--border2); }
  .antologia-header { display: flex; align-items: center; justify-content: space-between; padding: 0.7rem 1rem; cursor: pointer; background: var(--surface); user-select: none; }
  .antologia-title { display: flex; align-items: center; gap: 0.5rem; font-size: 0.88rem; font-weight: 500; }
  .antologia-badge { font-size: 0.65rem; padding: 0.2rem 0.5rem; border-radius: 4px; letter-spacing: 0.04em; font-weight: 500; }
  .badge-prox { background: rgba(196,92,58,0.2); color: #e07a5f; }
  .badge-activa { background: rgba(123,111,212,0.2); color: #a89fe8; }
  .badge-cierra { background: rgba(232,201,122,0.2); color: var(--accent); }
  .badge-pub { background: rgba(74,158,107,0.2); color: #6ecfa0; }
  .chevron { font-size: 0.7rem; color: var(--muted); transition: transform 0.2s; }
  .open .chevron { transform: rotate(180deg); }
  .task-list { display: none; padding: 0.5rem 0; background: var(--surface2); }
  .open .task-list { display: block; }

  .task-item { display: flex; align-items: flex-start; gap: 0.6rem; padding: 0.45rem 1rem; font-size: 0.82rem; line-height: 1.5; }
  .task-bullet { color: var(--muted); flex-shrink: 0; margin-top: 1px; }
  .task-text { flex: 1; color: #d0cdc8; }
  .task-text.done { text-decoration: line-through; color: var(--muted); }
  .task-owner { font-size: 0.72rem; color: var(--muted); font-style: italic; flex-shrink: 0; }
  .task-flags { flex-shrink: 0; }

  .general-block { margin-top: 0.5rem; padding: 0.75rem 1rem; border: 1px solid var(--border); border-radius: 8px; background: var(--surface); }
  .general-label { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.5rem; }

  /* STATS */
  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; margin-bottom: 1.75rem; padding-bottom: 1.75rem; border-bottom: 1px solid var(--border); }
  .stat-item { text-align: center; padding: 0.75rem 0.5rem; border: 1px solid var(--border); border-radius: 8px; background: var(--surface2); }
  .stat-num { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800; color: var(--accent); line-height: 1; }
  .stat-label { font-size: 0.65rem; color: var(--muted); letter-spacing: 0.05em; text-transform: uppercase; margin-top: 4px; }

  /* RIGHT */
  .right { padding: 2rem 1.75rem; display: flex; flex-direction: column; gap: 1.5rem; overflow-y: auto; }
  .news-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; animation: fadeIn 0.4s ease both; animation-delay: 0.2s; }
  .news-card-header { padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .news-card-title { font-family: 'Syne', sans-serif; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); }
  .news-body { padding: 1rem; font-size: 0.83rem; line-height: 1.8; color: #c8c5bf; white-space: pre-wrap; }
  .news-loading { padding: 1rem; display: flex; flex-direction: column; gap: 0.5rem; }
  .news-skel { height: 14px; background: var(--surface2); border-radius: 4px; animation: pulse 1.5s ease infinite; }
  .news-skel.short { width: 60%; }

  .links-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; padding: 1rem; }
  .quick-link { display: flex; align-items: center; gap: 0.5rem; padding: 0.55rem 0.75rem; border-radius: 7px; border: 1px solid var(--border); background: var(--surface2); text-decoration: none; color: var(--text); font-size: 0.78rem; transition: all 0.15s; }
  .quick-link:hover { border-color: var(--accent); color: var(--accent); background: rgba(232,201,122,0.06); }

  ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
</style>

      html += `<div class="task-list">`;

        const key = `${ant.id}_${ti}`;
        const isDone = saved.hasOwnProperty(key) ? saved[key] : t.done;

// FETCH NOTION
async function fetchNotion() {
  const url = `https://api.notion.com/v1/blocks/${PAGE_ID}/children?page_size=100`;
  const encoded = encodeURIComponent(url);
  
  try {
    const resp = await fetch(`${PROXY}${encoded}`, {
      headers: { 'X-Requested-With': 'XMLHttpRequest' }
    });
    const data = await resp.json();
    const blocks = JSON.parse(data.contents);
    renderNews(blocks.results);
    setStatus('live', 'Sincronizado con Notion');
  } catch(e) {
    setStatus('error', 'Sin conexión a Notion — mostrando última versión');
    renderNewsOffline();
  }
}

function getBlockText(block) {
  const type = block.type;
  if (!block[type]) return '';
  const rich = block[type].rich_text || [];
  return rich.map(r => r.plain_text).join('');
}

function renderNews(blocks) {
  let news1 = '', news2 = '', inImportant = false, inNews = false;

  blocks.forEach(b => {
    const text = getBlockText(b);
    if (b.type === 'heading_2') {
      if (text.includes('Noticia importante')) { inImportant = true; inNews = false; }
      else if (text.includes('Noticias')) { inNews = true; inImportant = false; }
      else { inNews = false; inImportant = false; }
      return;
    }
    if (b.type === 'divider') { return; }
    if (b.type === 'heading_3' || b.type === 'heading_1') { return; }
    if (!text) return;

    const line = (b.type === 'bulleted_list_item' ? '• ' : '') + text;
    if (inNews) news1 += line + '\n';
    else if (inImportant) news2 += line + '\n';
  });

  document.getElementById('news-container').innerHTML = `<div class="news-body">${news1.trim()}</div>`;

  if (news2.trim()) {
    document.getElementById('important-card').style.display = 'block';
    document.getElementById('important-container').innerHTML = `<div class="news-body">${news2.trim()}</div>`;
  }
}

function renderNewsOffline() {
  document.getElementById('news-container').innerHTML = `<div class="news-body" style="color:var(--muted);font-style:italic;">No se pudo conectar con Notion. Revisá tu conexión a internet.</div>`;
}

// INIT
buildAntologias();
fetchNotion();
</script>
